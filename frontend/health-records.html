<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Records - Predictive Healthcare</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .records-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: white; padding: 1rem 1.5rem; border-radius: 12px; border: 1px solid var(--border-color); }
        .search-bar { display: flex; align-items: center; background: #f1f5f9; padding: 0.6rem 1rem; border-radius: 8px; width: 300px; }
        .search-bar input { border: none; background: transparent; outline: none; margin-left: 0.5rem; width: 100%; font-size: 0.9rem; }
        .filter-tabs { display: flex; gap: 1rem; align-items: center; }
        .filter-tab { padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
        .filter-tab.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
        .filter-tab:hover:not(.active) { background: #f8fafc; border-color: var(--border-color); }
        .records-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .record-card { background: white; border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; transition: transform 0.2s, box-shadow 0.2s; }
        .record-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .record-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 1px solid #f1f5f9; }
        .record-date { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        .record-body { margin-bottom: 1.5rem; }
        .record-type { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; }
        .record-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; }
        .vitals-mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; background: #f8fafc; padding: 1rem; border-radius: 8px; }
        .vital-item { display: flex; flex-direction: column; gap: 0.2rem; }
        .vital-lbl { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        .vital-val { font-size: 0.95rem; font-weight: 600; color: var(--text-dark); }
        .record-footer { display: flex; gap: 0.8rem; }
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 4rem 2rem; background: white; border-radius: 12px; border: 1px dashed #cbd5e1; }
        .empty-state i { font-size: 3rem; color: #cbd5e1; margin-bottom: 1rem; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* New styling for the inline form section */
        .inline-form-section {
            display: none; /* Hidden by default */
            background: white;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            animation: fadeUp 0.3s ease;
        }
    </style>
</head>
<body class="records-page">

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <a href="index.html" class="sidebar-brand-link" id="brandLink">
                <div class="sidebar-brand">
                    <div class="logo-circle"><i class="fa-solid fa-notes-medical"></i></div>
                    <div class="brand-info">
                        <h2>Predictive</h2>
                        <h3>Healthcare Analysis</h3>
                    </div>
                </div>
            </a>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item"><i class="fa-solid fa-grid-2"></i> <span class="nav-text">Dashboard</span></a>
                <a href="heart-prediction.html" class="menu-item"><i class="fa-solid fa-user-doctor"></i> <span class="nav-text">Health Prediction</span></a>
                <a href="my-history.html" class="menu-item"><i class="fa-solid fa-clock-rotate-left"></i> <span class="nav-text">My History</span></a>
                <a href="health-records.html" class="menu-item active"><i class="fa-solid fa-folder-medical"></i> <span class="nav-text">Health Records</span></a>
                <a href="charts-trends.html" class="menu-item"><i class="fa-solid fa-chart-line"></i> <span class="nav-text">Charts & Trends</span></a>
                <a href="recommendations.html" class="menu-item"><i class="fa-solid fa-heart-circle-check"></i> <span class="nav-text">Recommendations</span></a>
                <a href="profile-settings.html" class="menu-item"><i class="fa-solid fa-gear"></i> <span class="nav-text">Patient Profile</span></a>
                <a href="index.html" class="menu-item logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> <span class="nav-text">Logout</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div class="user-greeting">
                    <h1>Health Records</h1>
                    <p>Securely view and manage your clinical data and AI assessments.</p>
                </div>
                <div class="header-actions">
                    <div class="profile-avatar">
                        <img src="https://i.pravatar.cc/100?img=32" alt="Profile Image" id="topAvatar">
                        <span class="profile-name">User <i class="fa-solid fa-chevron-down"></i></span>
                    </div>
                </div>
            </header>

            <div class="records-controls">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass" style="color: var(--text-muted);"></i>
                    <input type="text" placeholder="Search records by date or type...">
                </div>
                <div class="filter-tabs" id="recordFilters">
                    <div class="filter-tab active" data-filter="All">All Records</div>
                    <div class="filter-tab" data-filter="AI">AI Predictions</div>
                    <div class="filter-tab" data-filter="Manual">Manual Records</div>
                    <button id="addRecordBtn" class="btn-primary-sm" style="margin-left: 1rem; padding: 0.6rem 1.2rem; border-radius: 8px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: 600;">
                        <i class="fa-solid fa-plus"></i> Add Record
                    </button>
                </div>
            </div>

            
            <div class="records-grid" id="recordsGrid"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
